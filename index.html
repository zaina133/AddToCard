<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="cards.css">
</head>

<body>
    <div class="container">
        <div class="card mb-4 shadow-sm border-0">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-3" id="formTitle">Add New Product</h5>
                <div class="row g-2">
                    <div class="col-md-6"><input type="text" id="pTitle" class="form-control"
                            placeholder="Product Title"></div>
                    <div class="col-md-3"><input type="text" id="pPrice" class="form-control" placeholder="Price">
                    </div>
                    <div class="col-md-3"><input type="text" id="pCategory" class="form-control" placeholder="Category">
                    </div>
                    <div class="col-12 mt-3">
                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                            <div class="input-group w-50">
                                <input type="text" id="searchInput" oninput="searchProduct(this.value)"
                                    class="form-control" placeholder="Search by title...">
                                <button class="btn btn-outline-secondary" type="button">Search</button>
                            </div>
                            <div>
                                <button onclick="clearForm()" class="btn btn-light border">Clear</button>
                                <button id="mainBtn" onclick="addUpdateProduct()" class="btn btn-main px-4">Create
                                    Product</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold m-0">Products</h4>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3" id="displayRow">
        </div>
    </div>

   <script src="cards.js"></script>

</body>

</html>
